spring:
  application:
    name: agri-traceability-system
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:traceability;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 200

server:
  port: 8080
