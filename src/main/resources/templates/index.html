<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>农产品溯源系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container py-5">
    <div class="card shadow-sm p-4">
        <h2 class="mb-3">🥬 农产品溯源查询</h2>
        <p class="text-secondary">请输入农产品二维码（示例：<code>demo-qr-001</code>）</p>

        <form id="traceForm" class="row g-3">
            <div class="col-md-9">
                <input id="qrCode" class="form-control form-control-lg" placeholder="请输入二维码编号" required>
            </div>
            <div class="col-md-3 d-grid">
                <button class="btn btn-success btn-lg" type="submit">查询溯源信息</button>
            </div>
        </form>

        <div class="mt-4 alert alert-info">
            管理员录入入口：<a href="/admin" class="alert-link">/admin</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('traceForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const code = document.getElementById('qrCode').value.trim();
        if (!code) return;
        window.location.href = '/trace/' + encodeURIComponent(code);
    });
</script>
</body>
</html>
