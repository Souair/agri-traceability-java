<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>溯源查询结果</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container py-4" th:if="${result != null}">
    <a href="/" class="btn btn-link px-0">← 返回查询</a>

    <div class="card p-3 shadow-sm mb-3">
        <h4 class="mb-3">📦 批次信息</h4>
        <div><b>产品名称：</b><span th:text="${result.batch.productName}"></span></div>
        <div><b>批次编号：</b><span th:text="${result.batch.batchCode}"></span></div>
        <div><b>产地：</b><span th:text="${result.batch.origin}"></span></div>
        <div><b>生产主体：</b><span th:text="${result.batch.producer}"></span></div>
        <div><b>二维码：</b><code th:text="${result.batch.qrCode}"></code></div>
        <div class="mt-2">
            <span class="badge"
                  th:classappend="${result.integrityValid} ? 'bg-success' : 'bg-danger'"
                  th:text="${result.integrityValid} ? '数据完整性校验通过' : '数据完整性异常'">
            </span>
        </div>
    </div>

    <div class="card p-3 shadow-sm">
        <h4 class="mb-3">🧭 生命周期事件</h4>
        <div th:if="${#lists.isEmpty(result.events)}" class="text-muted">暂无事件记录</div>

        <div th:each="e : ${result.events}" class="timeline-item">
            <div class="d-flex justify-content-between">
                <b th:text="${e.stage}"></b>
                <span class="text-secondary" th:text="${#temporals.format(e.eventTime, 'yyyy-MM-dd HH:mm:ss')}"></span>
            </div>
            <div>操作人：<span th:text="${e.operatorName}"></span> | 地点：<span th:text="${e.location}"></span></div>
            <div class="mt-1" th:text="${e.details}"></div>
            <div class="small text-secondary" th:if="${e.iotPayload != null and e.iotPayload != ''}">
                IoT：<code th:text="${e.iotPayload}"></code>
            </div>
            <div class="small text-secondary mt-1">prevHash: <code th:text="${e.prevHash}"></code></div>
            <div class="small text-secondary">blockHash: <code th:text="${e.blockHash}"></code></div>
            <div class="small text-secondary">txId: <code th:text="${e.onChainTxId}"></code></div>
        </div>
    </div>
</div>
</body>
</html>
